name: manual-using-extra-docker-in-docker

on:
  workflow_dispatch:
    inputs:
      rosver:
        description: 'RouterOS Version (e.g. 7.22, 7.22rc2, 7.22beta4)'
        required: true
        default: "7.20"
      start_path:
        description: 'Starting path (space separated, leave empty for full schema)'
        required: false

jobs:
  job-using-extra-docker-in-docker:
    runs-on: ubuntu-latest

    env:
      URLBASE: http://localhost:9180/rest 
      BASICAUTH: "admin:" 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Install Docker Compose
      run: sudo apt-get install -y docker-compose

    - name: Configure git for automated commits
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Build and start RouterOS CHR in Docker
      run: |
        ROUTEROS_VERSION="${{ github.event.inputs.rosver }}"
        echo "RouterOS version: $ROUTEROS_VERSION"

        cat > docker-compose.yml <<EOF
        version: '3'
        services:
          routeros:
            build:
              context: .
              dockerfile: ./Dockerfile.chr-qemu
              args:
                ARG_ROUTEROS_VERSION: ${ROUTEROS_VERSION}
            restart: unless-stopped
            cap_add:
              - NET_ADMIN
            devices:
              - /dev/net/tun
              - /dev/kvm
            ports:
              - '9180:80'
              - '9122:22'
        EOF
        docker-compose up -d --build

    - name: Wait for RouterOS REST API to become available
      # CHR (Cloud Hosted Router) can take several minutes to boot in QEMU.
      # -sS: silent progress but show errors; -m 5: 5-second timeout per attempt.
      run: |
        echo "Waiting for RouterOS HTTP server to start (up to ~17 min)..."
        for i in {1..100}; do
          if curl -sS -m 5 --fail http://localhost:9180/ > /dev/null 2>&1; then
            echo "RouterOS REST API is up after $i attempt(s)."
            exit 0
          fi
          echo "Attempt $i/100: not ready yet, retrying in 10 seconds..."
          sleep 10
        done
        echo "::error::RouterOS did not start within expected time. Check Docker build logs."
        docker-compose logs
        exit 1

    - name: Verify REST API is responding
      run: curl -sS --fail http://admin@localhost:9180/rest/ip/address | jq .

    - name: Download and install extra packages into CHR
      # Extra packages add features like zerotier, iot, container, etc.
      # They are uploaded to the root of the CHR filesystem, then CHR is rebooted.
      run: |
        mkdir extra
        cd extra
        wget -q "https://download.mikrotik.com/routeros/${{ github.event.inputs.rosver }}/all_packages-x86-${{ github.event.inputs.rosver }}.zip"
        unzip -q all_packages*.zip
        rm all_packages*.zip
        cd ..
        scp -o 'StrictHostKeyChecking no' -P 9122 extra/* admin@localhost:/

    - name: Reboot CHR to activate extra packages
      # Use REST API for reboot first; SSH is a fallback if REST is not responding.
      # Note: the || true on SSH prevents failure when the connection drops mid-reboot.
      run: |
        if curl -sS --fail -X POST "http://admin@localhost:9180/rest/system/reboot" \
            --header "Content-Type: application/json"; then
          echo "Reboot initiated via REST API"
        else
          echo "REST API reboot failed, trying SSH..."
          ssh -o 'StrictHostKeyChecking no' -p 9122 admin@localhost /system/reboot || true
        fi

    - name: Setup Bun Runtime
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 'latest' 
    
    - name: Setup NodeJS 
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Wait for RouterOS to come back up after extra-packages reboot
      # After installing extra packages and rebooting, wait for CHR to restart.
      run: |
        echo "Waiting for RouterOS to restart with extra packages (up to ~17 min)..."
        for i in {1..100}; do
          if curl -sS -m 5 --fail http://localhost:9180/ > /dev/null 2>&1; then
            echo "RouterOS REST API is back up after $i attempt(s)."
            exit 0
          fi
          echo "Attempt $i/100: not ready yet, retrying in 10 seconds..."
          sleep 10
        done
        echo "::error::RouterOS did not restart within expected time after extra-packages reboot."
        docker-compose logs
        exit 1

    - name: List installed RouterOS packages (including extras)
      run: curl -sS --fail http://admin@localhost:9180/rest/system/package | jq '[.[] | .name]'

    - name: Get RouterOS version from device
      id: connection-check
      run: |
        BUNROSVER=$(bun rest2raml.js --version)
        echo "Detected RouterOS version: $BUNROSVER"
        echo "rosver=$BUNROSVER" | xargs >> "$GITHUB_OUTPUT"

    - name: Generate RAML schema from RouterOS REST API (with extra packages)
      run: |
        bun install js-yaml raml2html raml2html-slate-theme
        bun rest2raml.js ${{ github.event.inputs.start_path }}
        ./node_modules/.bin/raml2html -v --theme raml2html-slate-theme ros-rest*.raml > index.html

    - name: Validate RAML 1.0 using webapi-parser
      run: |
        npm install webapi-parser
        node validraml.cjs ros-rest*.raml 

    - name: Convert RAML 1.0 to OAS 2.0 using webapi-parser
      run: |
        node raml2oas.cjs ros-rest*.raml 

    - name: Publish schema files to /docs (extra subfolder)
      id: publish-to-docs
      run: |
        ROSVER="${{ steps.connection-check.outputs.rosver }}"
        ROS_FILTER=$(echo "${{ github.event.inputs.start_path }}" | tr ' ' '+')
        DOCS_PATH="docs/${ROSVER}/extra/${ROS_FILTER}"
        echo "Publishing to: $DOCS_PATH"
        mkdir -p "$DOCS_PATH/docs"
        cp index.html "$DOCS_PATH/docs/"
        cp ros-rest*.raml "$DOCS_PATH/schema.raml"
        cp ros-inspect*.json "$DOCS_PATH/inspect.json"
        cp ros-oas2*.json "$DOCS_PATH/oas2.json"
        echo "subpath=$ROS_FILTER" >> $GITHUB_OUTPUT

    - name: Commit and push schema to repository
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git pull
        git add docs/${{ steps.connection-check.outputs.rosver }}/
        git commit -m "Publish ${{ steps.connection-check.outputs.rosver }} extra/${{ steps.publish-to-docs.outputs.subpath }} [${{ github.workflow }}]"
        git push origin main

    - name: Save build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-results
        path: |
          ros-rest*.raml
          ros-inspect*.json
          index.html

    - name: Cleanup Docker containers
      if: always()
      run: docker-compose down
