name: "Build: Base Schema"

on:
  workflow_dispatch:
    inputs:
      rosver:
        description: 'RouterOS Version (e.g. 7.22, 7.22rc2, 7.22beta4)'
        required: true
        default: "7.20"
      start_path:
        description: 'Starting path (space separated, leave empty for full schema)'
        required: false

jobs:
  job-using-docker-in-docker:
    runs-on: ubuntu-latest

    env:
      URLBASE: http://localhost:9180/rest 
      BASICAUTH: "admin:" 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure git for automated commits
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Install QEMU
      # qemu-system-x86 provides qemu-system-x86_64; qemu-utils provides qemu-img for disk conversion
      run: sudo apt-get update -y && sudo apt-get install -y qemu-system-x86 qemu-utils

    - name: Enable KVM
      # GitHub hosted ubuntu-latest runners support KVM; this step makes /dev/kvm accessible.
      # MODE=0666 is acceptable here because GitHub runners are ephemeral and single-tenant.
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        ls -la /dev/kvm

    - name: Download RouterOS CHR image
      run: |
        ROUTEROS_VERSION="${{ github.event.inputs.rosver }}"
        echo "Downloading RouterOS $ROUTEROS_VERSION CHR image..."
        # Try download.mikrotik.com first (stable releases), fall back to cdn.mikrotik.com (beta/rc)
        wget -q "https://download.mikrotik.com/routeros/${ROUTEROS_VERSION}/chr-${ROUTEROS_VERSION}.vdi.zip" \
            -O "chr-${ROUTEROS_VERSION}.vdi.zip" \
        || (rm -f "chr-${ROUTEROS_VERSION}.vdi.zip" && \
            wget -q "https://cdn.mikrotik.com/routeros/${ROUTEROS_VERSION}/chr-${ROUTEROS_VERSION}.vdi.zip" \
                -O "chr-${ROUTEROS_VERSION}.vdi.zip")
        unzip -q "chr-${ROUTEROS_VERSION}.vdi.zip"
        rm -f "chr-${ROUTEROS_VERSION}.vdi.zip"
        ls -lh chr-*.vdi

    - name: Convert CHR image to qcow2 for virtio disk
      # qcow2 is the native QEMU format and works well with virtio drivers supported by CHR.
      # Converting from VDI here avoids any VirtualBox-format quirks with QEMU.
      run: |
        ROUTEROS_VERSION="${{ github.event.inputs.rosver }}"
        qemu-img convert -f vdi -O qcow2 \
            "chr-${ROUTEROS_VERSION}.vdi" \
            "chr-${ROUTEROS_VERSION}.qcow2"
        rm -f "chr-${ROUTEROS_VERSION}.vdi"
        ls -lh chr-*.qcow2

    - name: Start RouterOS CHR in QEMU
      # Run QEMU directly on the runner using user-mode networking with port forwarding.
      # host:9180 → VM:80 (REST API), host:9122 → VM:22 (SSH), host:8728 → VM:8728 (native API)
      # Uses virtio disk (qcow2) and virtio-net — both supported by MikroTik CHR on x86.
      # KVM is used when available; falls back to software emulation automatically.
      run: |
        ROUTEROS_VERSION="${{ github.event.inputs.rosver }}"
        KVM_OPTS=""
        if [ -e /dev/kvm ]; then
          KVM_OPTS="-enable-kvm -cpu host"
          echo "KVM available — using hardware acceleration."
        else
          echo "::warning::KVM not found — QEMU will run in software emulation mode (slow)."
        fi
        nohup qemu-system-x86_64 \
            ${KVM_OPTS} \
            -m 256 \
            -nographic \
            -drive file=chr-${ROUTEROS_VERSION}.qcow2,format=qcow2,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::9180-:80,hostfwd=tcp::9122-:22,hostfwd=tcp::8728-:8728 \
            -device virtio-net-pci,netdev=net0 \
            &>/tmp/qemu.log &
        QEMU_PID=$!
        echo "QEMU started with PID: $QEMU_PID"
        echo "$QEMU_PID" > /tmp/qemu.pid

    - name: Wait for RouterOS REST API to become available
      # CHR typically boots in 1-3 minutes under KVM. Allow up to 5 minutes before failing.
      # -sS: silent but show errors; -m 5: 5-second connect timeout per attempt.
      run: |
        echo "Waiting for RouterOS HTTP server to start (up to 5 min)..."
        for i in {1..30}; do
          if curl -sS -m 5 --fail http://localhost:9180/ > /dev/null 2>&1; then
            echo "RouterOS REST API is up after $i attempt(s)."
            exit 0
          fi
          echo "Attempt $i/30: not ready yet, retrying in 10 seconds..."
          sleep 10
        done
        echo "::error::RouterOS did not start within 5 minutes. QEMU log:"
        cat /tmp/qemu.log
        exit 1

    - name: Verify REST API is responding
      run: curl -sS --fail http://admin@localhost:9180/rest/ip/address | jq .

    - name: Setup Bun Runtime
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 'latest' 
    
    - name: Setup NodeJS 
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: List installed RouterOS packages
      run: curl -sS --fail http://admin@localhost:9180/rest/system/package | jq '[.[] | .name]'

    - name: Get RouterOS version from device
      id: connection-check
      run: |
        BUNROSVER=$(bun rest2raml.js --version)
        echo "Detected RouterOS version: $BUNROSVER"
        echo "rosver=$BUNROSVER" | xargs >> "$GITHUB_OUTPUT"

    - name: Generate RAML schema from RouterOS REST API
      run: |
        bun install
        bun rest2raml.js ${{ github.event.inputs.start_path }}

    - name: Validate RAML 1.0 using webapi-parser
      run: |
        npm install webapi-parser
        node validraml.cjs ros-rest*.raml

    - name: Generate deep-inspect.json and openapi.json
      run: |
        bun deep-inspect.ts \
          --inspect-file ros-inspect-all.json \
          --ros-version "${{ steps.connection-check.outputs.rosver }}" \
          --output-dir . \
          --test-crash-paths

    - name: Validate OpenAPI 3.0 schema
      run: bun validate-openapi.ts openapi.json

    - name: Enrich OpenAPI schema with documentation from rosetta
      if: hashFiles('openapi.json') != ''
      run: |
        curl -fsSL -o ros-help.db.gz \
          https://github.com/tikoci/rosetta/releases/latest/download/ros-help.db.gz
        bun -e "
          import { gunzipSync } from 'bun';
          const gz = new Uint8Array(await Bun.file('ros-help.db.gz').arrayBuffer());
          await Bun.write('ros-help.db', gunzipSync(gz));
        "
        bun enrich-openapi.ts --openapi openapi.json --db ros-help.db
        rm -f ros-help.db ros-help.db.gz

    - name: Validate enriched OpenAPI 3.0 schema
      if: hashFiles('openapi.json') != ''
      run: bun validate-openapi.ts openapi.json

    - name: Run deep-inspect integration tests
      run: bun test deep-inspect.integration.test.ts

    - name: Publish schema files to /docs
      id: publish-to-docs
      run: |
        ROSVER="${{ steps.connection-check.outputs.rosver }}"
        ROS_FILTER=$(echo "${{ github.event.inputs.start_path }}" | tr ' ' '+')
        DOCS_PATH="docs/${ROSVER}/${ROS_FILTER}"
        echo "Publishing to: $DOCS_PATH"
        mkdir -p "$DOCS_PATH"
        cp ros-rest*.raml "$DOCS_PATH/schema.raml"
        cp ros-inspect*.json "$DOCS_PATH/inspect.json"
        if [ -f deep-inspect.json ]; then cp deep-inspect.json "$DOCS_PATH/"; fi
        if [ -f openapi.json ]; then cp openapi.json "$DOCS_PATH/"; fi
        echo "subpath=$ROS_FILTER" >> $GITHUB_OUTPUT

    - name: Commit and push schema to repository
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git add docs/${{ steps.connection-check.outputs.rosver }}/
        git commit -m "Publish ${{ steps.connection-check.outputs.rosver }} ${{ steps.publish-to-docs.outputs.subpath }} [${{ github.workflow }}]"
        # Retry push with pull --rebase to handle concurrent build conflicts.
        # Multiple builds (base + extra, multiple versions) can run simultaneously and all
        # push to main. If another job commits first the push is rejected; rebasing our commit
        # on top of the new remote state is safe because each build writes to its own
        # docs/{version}/ directory — there are no real file conflicts to resolve.
        for attempt in {1..5}; do
          if git push origin main; then
            break
          elif [ $attempt -eq 5 ]; then
            echo "::error::Failed to push after 5 attempts due to concurrent build conflicts."
            exit 1
          fi
          echo "::warning::Push attempt $attempt/5 failed (remote is ahead), rebasing and retrying..."
          # Clean up unstaged changes left by bun install / npm install so that
          # git pull --rebase can proceed. Do this right before rebase, not before
          # artifact upload (which happens after push succeeds or fails).
          git checkout -- .
          git clean -fd
          git pull --rebase
          sleep $((RANDOM % 10 + 5))
        done

    - name: Save build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-results
        path: |
          ros-rest*.raml
          ros-inspect*.json
          deep-inspect.json
          openapi.json
          index.html

    - name: Cleanup QEMU
      if: always()
      run: |
        if [ -f /tmp/qemu.pid ]; then
          kill "$(cat /tmp/qemu.pid)" || true
          echo "QEMU process terminated."
        fi
