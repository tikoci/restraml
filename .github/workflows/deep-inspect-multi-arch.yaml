name: "Build: Deep-Inspect Multi-Arch"

# Produces per-architecture deep-inspect files by booting x86 and arm64 CHRs
# with all extra packages, running a live /console/inspect crawl + completion
# enrichment on each, and diffing the results. Each architecture does its own
# independent crawl (BACKLOG.md principle 2). Output files:
#
#   docs/{version}/extra/deep-inspect.x86.json
#   docs/{version}/extra/deep-inspect.arm64.json
#   docs/{version}/extra/diff-deep-inspect.json
#
# Dispatched by auto.yaml when per-arch deep-inspect files are missing,
# or triggered manually (workflow_dispatch) for backfill / re-generation.

on:
  workflow_dispatch:
    inputs:
      rosver:
        description: 'RouterOS Version (e.g. 7.22.1, 7.23beta5)'
        required: true

jobs:
  # ── x86 deep-inspect (KVM, fast) ─────────────────────────────────────────
  deep-inspect-x86:
    name: "x86: ${{ inputs.rosver }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      URLBASE: http://localhost:9180/rest
      BASICAUTH: "admin:"
      MIKROTIK_ACCOUNT: ${{ secrets.MIKROTIK_ACCOUNT }}
      MIKROTIK_PASSWORD: ${{ secrets.MIKROTIK_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install QEMU (x86)
        run: sudo apt-get update -y && sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Download CHR x86 image
        run: |
          VER="${{ inputs.rosver }}"
          wget -q "https://download.mikrotik.com/routeros/${VER}/chr-${VER}.vdi.zip" -O chr.vdi.zip \
            || (rm -f chr.vdi.zip && wget -q "https://cdn.mikrotik.com/routeros/${VER}/chr-${VER}.vdi.zip" -O chr.vdi.zip)
          unzip -q chr.vdi.zip
          qemu-img convert -f vdi -O qcow2 chr-*.vdi chr.qcow2
          rm -f chr-*.vdi chr.vdi.zip

      - name: Start x86 CHR in QEMU
        run: |
          nohup qemu-system-x86_64 \
            -enable-kvm -cpu host -m 256 -nographic \
            -drive file=chr.qcow2,format=qcow2,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::9180-:80,hostfwd=tcp::9122-:22 \
            -device virtio-net-pci,netdev=net0 \
            &>/tmp/qemu.log &
          echo $! > /tmp/qemu.pid
          echo "QEMU started with PID: $(cat /tmp/qemu.pid)"

      - name: Wait for REST API
        run: |
          wait_for_rest_ready() {
            local attempts="$1"
            local consecutive=0

            for i in $(seq 1 "$attempts"); do
              if curl -sS -m 3 --fail http://admin:@localhost:9180/rest/system/resource 2>/dev/null \
                | python3 -c 'import json, sys; body = json.load(sys.stdin); sys.exit(0 if isinstance(body, dict) and "board-name" in body else 1)' \
                >/dev/null 2>&1; then
                consecutive=$((consecutive + 1))
                if [ "$consecutive" -ge 2 ]; then
                  echo "REST API is ready after $i attempt(s)."
                  return 0
                fi
              else
                consecutive=0
              fi

              if [ $((i % 6)) -eq 0 ]; then
                echo "Attempt $i/$attempts: REST not fully ready yet (~$((i * 5))s elapsed)..."
              fi
              sleep 5
            done
            return 1
          }

          echo "Waiting for x86 RouterOS REST API (up to 120s)..."
          if wait_for_rest_ready 24; then
            exit 0
          fi
          echo "::error::x86 CHR did not become REST-ready within 120s. QEMU log:"
          cat /tmp/qemu.log
          exit 1

      - name: Activate CHR trial license
        if: env.MIKROTIK_ACCOUNT != ''
        run: |
          curl -sS -X POST http://admin:@localhost:9180/rest/system/license/renew \
            -H 'Content-Type: application/json' \
            -d "{\"account\":\"${MIKROTIK_ACCOUNT}\",\"password\":\"${MIKROTIK_PASSWORD}\",\"level\":\"p1\"}" \
            && echo "License activated to p1 (trial)" \
            || echo "::warning::License activation failed — enrichment will run at 1 Mbit/s (free)"

      - name: Download and install extra packages
        run: |
          VER="${{ inputs.rosver }}"
          mkdir extra && cd extra
          wget -q "https://download.mikrotik.com/routeros/${VER}/all_packages-x86-${VER}.zip" \
            || wget -q "https://cdn.mikrotik.com/routeros/${VER}/all_packages-x86-${VER}.zip"
          unzip -q all_packages*.zip && rm all_packages*.zip && cd ..
          scp -o StrictHostKeyChecking=no -P 9122 extra/* admin@localhost:/

      - name: Reboot CHR and wait for extra packages
        run: |
          wait_for_rest_down() {
            for i in $(seq 1 15); do
              if ! curl -sS -m 3 --fail http://localhost:9180/ > /dev/null 2>&1; then
                echo "REST API went down after $i attempt(s)."
                return 0
              fi
              sleep 2
            done
            echo "::warning::REST API never visibly went down after reboot request; continuing with readiness wait."
          }

          wait_for_rest_ready() {
            local attempts="$1"
            local consecutive=0

            for i in $(seq 1 "$attempts"); do
              if curl -sS -m 3 --fail http://admin:@localhost:9180/rest/system/resource 2>/dev/null \
                | python3 -c 'import json, sys; body = json.load(sys.stdin); sys.exit(0 if isinstance(body, dict) and "board-name" in body else 1)' \
                >/dev/null 2>&1; then
                consecutive=$((consecutive + 1))
                if [ "$consecutive" -ge 2 ]; then
                  echo "REST API is ready after $i attempt(s)."
                  return 0
                fi
              else
                consecutive=0
              fi

              if [ $((i % 6)) -eq 0 ]; then
                echo "Attempt $i/$attempts: REST not fully ready yet (~$((i * 5))s elapsed)..."
              fi
              sleep 5
            done
            return 1
          }

          curl -sS -m 5 --fail -X POST http://admin:@localhost:9180/rest/system/reboot \
            -H 'Content-Type: application/json' > /dev/null 2>&1 || \
            ssh -o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=no -p 9122 admin@localhost /system/reboot > /dev/null 2>&1 || true

          wait_for_rest_down
          echo "Waiting for x86 CHR to restart with extra packages (up to 240s)..."
          if wait_for_rest_ready 48; then
            exit 0
          fi
          echo "::error::x86 CHR did not become REST-ready after extra-packages reboot within 240s."
          exit 1

      - name: List installed packages
        run: |
          PKG_JSON=$(curl -sS --fail http://admin@localhost:9180/rest/system/package)
          echo "$PKG_JSON" | jq '[.[] | .name]'
          PKG_COUNT=$(echo "$PKG_JSON" | jq 'length')
          if [ "$PKG_COUNT" -lt 10 ]; then
            echo "::error::Only $PKG_COUNT package(s) installed (expected ≥10 with extra packages). Extra package install likely failed."
            exit 1
          fi
          echo "✓ $PKG_COUNT packages installed"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run deep-inspect (x86, live crawl + enrichment)
        run: |
          bun deep-inspect.ts --live --arch x86 --output-suffix x86 \
            --output-dir . --skip-openapi --test-crash-paths --transport rest

      - name: Verify x86 deep-inspect output
        run: |
          ARGS_TOTAL=$(jq '._meta.completionStats.argsTotal' deep-inspect.x86.json)
          echo "x86 argsTotal: $ARGS_TOTAL"
          if [ "$ARGS_TOTAL" -lt 30000 ]; then
            echo "::error::x86 argsTotal=$ARGS_TOTAL is below expected minimum of 30000. Output is likely incomplete."
            exit 1
          fi
          echo "✓ x86 argsTotal=$ARGS_TOTAL (≥30000)"

      - name: Upload deep-inspect.x86.json
        uses: actions/upload-artifact@v4
        with:
          name: deep-inspect-x86
          path: deep-inspect.x86.json

      - name: Cleanup QEMU
        if: always()
        run: |
          if [ -f /tmp/qemu.pid ]; then
            kill "$(cat /tmp/qemu.pid)" || true
            echo "QEMU process terminated."
          fi

  # ── arm64 deep-inspect (KVM preferred, TCG viable) ───────────────────────
  # Runs on ubuntu-24.04-arm (native aarch64 runner).
  # Uses KVM if available (fast: ~53ms/call, ~8 min total), falls back to TCG
  # (viable: ~44-71ms/call locally, ~10 min total — but needs ≥1024 MB RAM).
  #
  # Previous CI failures with TCG were caused by -m 256 (memory pressure,
  # not TCG speed). With 17 extra packages loaded, 256 MB causes the guest
  # to thrash, inflating REST calls from ~70ms to ~10s+ and eventually
  # crashing the REST server. Local TCG with 1024 MB: 44ms child, 71ms
  # completion — projecting ~10 min for full deep-inspect.
  #
  # Package installation uses REST /execute (check-for-updates + enable +
  # apply-changes). This works under both KVM and TCG — no SCP needed.
  deep-inspect-arm64:
    name: "arm64: ${{ inputs.rosver }}"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      URLBASE: http://localhost:9180/rest
      BASICAUTH: "admin:"
      MIKROTIK_ACCOUNT: ${{ secrets.MIKROTIK_ACCOUNT }}
      MIKROTIK_PASSWORD: ${{ secrets.MIKROTIK_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install QEMU for aarch64
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-arm qemu-efi-aarch64 > /dev/null
          qemu-system-aarch64 --version | head -1

      - name: Probe accelerator
        # Try KVM first (fast path); fall back to TCG (viable with enough RAM).
        # Partner ARM runners may expose /dev/kvm but reject the ioctl — probe
        # the KVM API directly, don't trust device presence alone.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules > /dev/null
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

          if python3 -c '
          import fcntl, os, sys
          fd = os.open("/dev/kvm", os.O_RDWR | os.O_CLOEXEC)
          ver = fcntl.ioctl(fd, 0xAE00, 0)
          os.close(fd)
          print(f"KVM API version: {ver}")
          sys.exit(0 if ver == 12 else 1)
          ' 2>/dev/null; then
            echo "ARM_ACCEL=kvm" >> "$GITHUB_ENV"
            echo "✓ KVM available — using hardware acceleration"
          else
            echo "ARM_ACCEL=tcg" >> "$GITHUB_ENV"
            echo "⚠ KVM not available — using TCG (software emulation, ~10 min deep-inspect)"
          fi

      - name: Download CHR arm64 image
        run: |
          VER="${{ inputs.rosver }}"
          wget -q "https://download.mikrotik.com/routeros/${VER}/chr-${VER}-arm64.img.zip" -O chr-arm64.img.zip \
            || (rm -f chr-arm64.img.zip && wget -q "https://cdn.mikrotik.com/routeros/${VER}/chr-${VER}-arm64.img.zip" -O chr-arm64.img.zip)
          unzip -q chr-arm64.img.zip
          mv chr-*-arm64.img chr-arm64.img
          rm -f chr-arm64.img.zip
          ls -lh chr-arm64.img

      - name: Start arm64 CHR in QEMU
        # CRITICAL aarch64 rules:
        #   1. virtio-blk-pci (NOT if=virtio) — MMIO causes silent kernel stall
        #   2. 1024 MB RAM — 256 MB causes memory pressure with extra packages,
        #      inflating REST calls from ~70ms to ~10s+ under TCG
        #   3. KVM: -cpu host -enable-kvm; TCG: -cpu cortex-a72 -accel tcg,tb-size=256
        run: |
          AAVMF_CODE=$(readlink -f /usr/share/AAVMF/AAVMF_CODE.fd)
          AAVMF_VARS=$(readlink -f /usr/share/AAVMF/AAVMF_VARS.fd)
          cp "$AAVMF_VARS" /tmp/aavmf-vars.fd
          truncate -s "$(stat -Lc%s "$AAVMF_CODE")" /tmp/aavmf-vars.fd

          if [ "${ARM_ACCEL}" = "kvm" ]; then
            CPU_ARGS=( -cpu host -enable-kvm )
          else
            CPU_ARGS=( -cpu cortex-a72 -accel tcg,tb-size=256 )
          fi

          nohup qemu-system-aarch64 \
            -M virt "${CPU_ARGS[@]}" -m 1024 -nographic \
            -drive if=pflash,format=raw,readonly=on,unit=0,file="$AAVMF_CODE" \
            -drive if=pflash,format=raw,unit=1,file=/tmp/aavmf-vars.fd \
            -drive file=chr-arm64.img,format=raw,if=none,id=drive0 \
            -device virtio-blk-pci,drive=drive0 \
            -netdev user,id=net0,hostfwd=tcp::9180-:80,hostfwd=tcp::9122-:22 \
            -device virtio-net-pci,netdev=net0 \
            &>/tmp/qemu.log &
          echo $! > /tmp/qemu.pid
          echo "QEMU aarch64 started (${ARM_ACCEL}, 1024 MB) PID=$(cat /tmp/qemu.pid)"

      - name: Wait for REST API
        # TCG boot takes ~60-100s (vs ~5s KVM). Per-call HTTP round-trip under
        # TCG is 5-15s through the emulated TCP stack — curl -m 3 silently times
        # out. Use -m 15 for TCG.
        run: |
          if [ "${ARM_ACCEL}" = "kvm" ]; then
            BOOT_TIMEOUT=120; CURL_TIMEOUT=3; SLEEP_INT=5
          else
            BOOT_TIMEOUT=300; CURL_TIMEOUT=15; SLEEP_INT=10
          fi

          start_time=$(date +%s)
          consecutive=0
          MAX_ATTEMPTS=$(( BOOT_TIMEOUT / (CURL_TIMEOUT + SLEEP_INT) + 1 ))

          echo "Waiting for arm64 REST API (accel=${ARM_ACCEL}, curl_timeout=${CURL_TIMEOUT}s, up to ${BOOT_TIMEOUT}s)..."
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            elapsed=$(( $(date +%s) - start_time ))
            [ "$elapsed" -ge "$BOOT_TIMEOUT" ] && break

            if curl -sS -m "${CURL_TIMEOUT}" --fail http://admin:@localhost:9180/rest/system/resource 2>/dev/null \
              | python3 -c 'import json,sys; d=json.load(sys.stdin); sys.exit(0 if isinstance(d,dict) and "board-name" in d else 1)' \
              >/dev/null 2>&1; then
              consecutive=$((consecutive + 1))
              if [ "$consecutive" -ge 2 ]; then
                echo "REST ready after ${elapsed}s (attempt $attempt, accel=${ARM_ACCEL})."
                exit 0
              fi
            else
              consecutive=0
            fi
            [ $((attempt % 5)) -eq 0 ] && echo "  attempt $attempt: ${elapsed}s/${BOOT_TIMEOUT}s (accel=${ARM_ACCEL})..."
            sleep "$SLEEP_INT"
          done

          echo "::error::arm64 CHR did not become REST-ready in ${BOOT_TIMEOUT}s (accel=${ARM_ACCEL})."
          echo "--- QEMU process ---"
          ps -p "$(cat /tmp/qemu.pid)" -o pid,stat,%cpu,%mem,etime,args 2>/dev/null || echo "QEMU not running!"
          echo "--- Diagnostic probe ---"
          curl -sS -m 20 -w 'connect:%{time_connect}s total:%{time_total}s http_code:%{http_code}\n' \
            http://admin:@localhost:9180/rest/system/resource 2>&1 || true
          echo "--- QEMU log (last 40 lines) ---"
          tail -40 /tmp/qemu.log || true
          exit 1

      - name: Activate CHR trial license
        if: env.MIKROTIK_ACCOUNT != ''
        run: |
          if [ "${ARM_ACCEL}" = "kvm" ]; then CURL_T=10; else CURL_T=30; fi
          curl -sS -m "$CURL_T" -X POST http://admin:@localhost:9180/rest/system/license/renew \
            -H 'Content-Type: application/json' \
            -d "{\"account\":\"${MIKROTIK_ACCOUNT}\",\"password\":\"${MIKROTIK_PASSWORD}\",\"level\":\"p1\"}" \
            && echo "License activated (p1 trial)" \
            || echo "::warning::License activation failed — running at 1 Mbit/s (free)"

      - name: Install extra packages via REST
        # POST /rest/execute dispatches an async RouterOS script that:
        #   1. check-for-updates — downloads available packages via SLIRP
        #   2. enable [find] — enables all discovered packages
        #   3. delay 5s — let package state settle
        #   4. apply-changes — triggers automatic reboot
        # Fire-and-forget: curl returns immediately, script runs on the CHR.
        run: |
          if [ "${ARM_ACCEL}" = "kvm" ]; then CURL_T=10; else CURL_T=30; fi
          curl -sS -m "$CURL_T" -X POST http://admin:@localhost:9180/rest/execute \
            -H 'Content-Type: application/json' \
            -d '{"script":"/system/package/update/check-for-updates duration=15s; /system/package/enable [find]; :delay 5s; /system/package/apply-changes","as-string":"true"}' \
            && echo "Package install script dispatched (async — CHR will reboot)" \
            || echo "::warning::Execute call returned error; packages may not install"

      - name: Wait for package activation reboot
        # The execute script runs ~20s then triggers apply-changes (reboot).
        # Wait for REST to go down, then come back with extra packages active.
        run: |
          if [ "${ARM_ACCEL}" = "kvm" ]; then
            DOWN_TIMEOUT=3; CURL_TIMEOUT=3; SLEEP_INT=5; REBOOT_TIMEOUT=240
          else
            DOWN_TIMEOUT=15; CURL_TIMEOUT=15; SLEEP_INT=10; REBOOT_TIMEOUT=600
          fi

          echo "Waiting for CHR to go down (execute script takes ~20s before reboot)..."
          for i in $(seq 1 20); do
            if ! curl -sS -m "$DOWN_TIMEOUT" --fail http://localhost:9180/ > /dev/null 2>&1; then
              echo "REST went down after $((i * 3))s."
              break
            fi
            sleep 3
          done

          echo "Waiting for arm64 CHR to restart with extra packages (up to ${REBOOT_TIMEOUT}s, accel=${ARM_ACCEL})..."
          start_time=$(date +%s)
          consecutive=0
          MAX_ATTEMPTS=$(( REBOOT_TIMEOUT / (CURL_TIMEOUT + SLEEP_INT) + 1 ))
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            elapsed=$(( $(date +%s) - start_time ))
            [ "$elapsed" -ge "$REBOOT_TIMEOUT" ] && break

            if curl -sS -m "${CURL_TIMEOUT}" --fail http://admin:@localhost:9180/rest/system/resource 2>/dev/null \
              | python3 -c 'import json,sys; d=json.load(sys.stdin); sys.exit(0 if isinstance(d,dict) and "board-name" in d else 1)' \
              >/dev/null 2>&1; then
              consecutive=$((consecutive + 1))
              if [ "$consecutive" -ge 2 ]; then
                echo "REST ready after ${elapsed}s (attempt $attempt, accel=${ARM_ACCEL})."
                exit 0
              fi
            else
              consecutive=0
            fi
            [ $((attempt % 5)) -eq 0 ] && echo "  attempt $attempt: ${elapsed}s/${REBOOT_TIMEOUT}s (accel=${ARM_ACCEL})..."
            sleep "$SLEEP_INT"
          done

          echo "::error::arm64 CHR did not become REST-ready after package activation (${REBOOT_TIMEOUT}s, accel=${ARM_ACCEL})."
          tail -40 /tmp/qemu.log || true
          exit 1

      - name: List installed packages
        run: |
          if [ "${ARM_ACCEL}" = "kvm" ]; then CURL_T=10; else CURL_T=20; fi
          PKG_JSON=$(curl -sS -m "$CURL_T" --fail http://admin@localhost:9180/rest/system/package)
          echo "$PKG_JSON" | jq '[.[] | .name]'
          PKG_COUNT=$(echo "$PKG_JSON" | jq 'length')
          if [ "$PKG_COUNT" -lt 10 ]; then
            echo "::error::Only $PKG_COUNT package(s) installed (expected ≥10). Package install failed."
            exit 1
          fi
          echo "✓ $PKG_COUNT packages installed"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run deep-inspect (arm64, live crawl + enrichment)
        # TCG per-request timeout: 120s (generous margin over measured ~70ms;
        # handles occasional slow calls without masking real failures).
        # KVM: 30s is sufficient.
        run: |
          if [ "${ARM_ACCEL}" = "kvm" ]; then REQ_TIMEOUT=30000; else REQ_TIMEOUT=120000; fi
          bun deep-inspect.ts --live --arch arm64 --output-suffix arm64 \
            --output-dir . --skip-openapi --test-crash-paths --transport rest \
            --request-timeout "$REQ_TIMEOUT"

      - name: Verify arm64 deep-inspect output
        run: |
          ARGS_TOTAL=$(jq '._meta.completionStats.argsTotal' deep-inspect.arm64.json)
          echo "arm64 argsTotal: $ARGS_TOTAL"
          if [ "$ARGS_TOTAL" -lt 30000 ]; then
            echo "::error::arm64 argsTotal=$ARGS_TOTAL is below expected minimum of 30000."
            exit 1
          fi
          echo "✓ arm64 argsTotal=$ARGS_TOTAL (≥30000)"

      - name: Upload deep-inspect.arm64.json
        uses: actions/upload-artifact@v4
        with:
          name: deep-inspect-arm64
          path: deep-inspect.arm64.json

      - name: Cleanup QEMU
        if: always()
        run: |
          if [ -f /tmp/qemu.pid ]; then
            kill "$(cat /tmp/qemu.pid)" || true
            echo "QEMU process terminated."
          fi

  # ── Diff + Publish ────────────────────────────────────────────────────────
  diff-and-publish:
    name: "Diff & Publish: ${{ inputs.rosver }}"
    needs: [deep-inspect-x86, deep-inspect-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git for automated commits
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download x86 deep-inspect artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-inspect-x86

      - name: Download arm64 deep-inspect artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-inspect-arm64

      - name: Verify artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -lh deep-inspect.x86.json deep-inspect.arm64.json
          echo "x86 _meta.version: $(jq -r '._meta.version' deep-inspect.x86.json)"
          echo "arm64 _meta.version: $(jq -r '._meta.version' deep-inspect.arm64.json)"
          echo "x86 argsTotal: $(jq '._meta.completionStats.argsTotal' deep-inspect.x86.json)"
          echo "arm64 argsTotal: $(jq '._meta.completionStats.argsTotal' deep-inspect.arm64.json)"

      - name: Run diff (text report to stdout + JSON to file)
        run: |
          echo "=== Text diff report ==="
          bun scripts/diff-deep-inspect.ts deep-inspect.x86.json deep-inspect.arm64.json
          echo ""
          echo "=== Generating JSON diff ==="
          bun scripts/diff-deep-inspect.ts deep-inspect.x86.json deep-inspect.arm64.json --json > diff-deep-inspect.json
          echo "diff-deep-inspect.json: $(du -h diff-deep-inspect.json | cut -f1)"

      - name: Verify diff is not a relabeled x86 copy
        run: |
          ARM64_ONLY=$(jq '.counts.pathsOnlyB' diff-deep-inspect.json)
          X86_ONLY=$(jq '.counts.pathsOnlyA' diff-deep-inspect.json)
          echo "Paths only in arm64: $ARM64_ONLY"
          echo "Paths only in x86:   $X86_ONLY"
          if [ "$ARM64_ONLY" -lt 500 ]; then
            echo "::error::arm64 has only $ARM64_ONLY unique paths (expected ≥500). arm64 output may be a relabeled x86 tree or the crawl was incomplete."
            exit 1
          fi
          echo "✓ arm64 structural delta looks legitimate ($ARM64_ONLY arm64-only paths)"

      - name: Generate step summary
        run: |
          echo "### Deep-Inspect Multi-Arch: ${{ inputs.rosver }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| deep-inspect.x86.json | $(du -h deep-inspect.x86.json | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| deep-inspect.arm64.json | $(du -h deep-inspect.arm64.json | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| diff-deep-inspect.json | $(du -h diff-deep-inspect.json | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bun scripts/diff-deep-inspect.ts deep-inspect.x86.json deep-inspect.arm64.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Publish deep-inspect files to docs
        run: |
          VER="${{ inputs.rosver }}"
          DOCS_PATH="docs/${VER}/extra"
          mkdir -p "$DOCS_PATH"
          cp deep-inspect.x86.json "$DOCS_PATH/"
          cp deep-inspect.arm64.json "$DOCS_PATH/"
          cp diff-deep-inspect.json "$DOCS_PATH/"
          echo "Published to: $DOCS_PATH"
          ls -lh "$DOCS_PATH"/deep-inspect.*.json "$DOCS_PATH"/diff-deep-inspect.json

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ inputs.rosver }}"
          git add "docs/${VER}/extra/"
          # Only commit if there are changes (handles re-runs gracefully)
          if git diff --cached --quiet; then
            echo "No changes to commit — files already match."
            exit 0
          fi
          git commit -m "Publish ${VER} deep-inspect multi-arch [${{ github.workflow }}]"
          # Retry push with pull --rebase to handle concurrent build conflicts.
          for attempt in {1..5}; do
            if git push origin main; then
              break
            elif [ $attempt -eq 5 ]; then
              echo "::error::Failed to push after 5 attempts due to concurrent build conflicts."
              exit 1
            fi
            echo "::warning::Push attempt $attempt/5 failed (remote is ahead), rebasing and retrying..."
            git checkout -- .
            git clean -fd
            git pull --rebase
            sleep $((RANDOM % 10 + 5))
          done

      - name: Upload all build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deep-inspect-multi-arch-${{ inputs.rosver }}
          path: |
            deep-inspect.x86.json
            deep-inspect.arm64.json
            diff-deep-inspect.json
